  <style>
    :root {
      --red: #c10c10;
      --red-dark: #9a0a0a;
      --text: #1a1a1a;
      --text-muted: #555;
      --bg: #f3f2ef;
      --card: #ffffff;
      --border: #e2e0dc;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Outfit', 'Helvetica Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 640px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 3rem 2.25rem;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 600;
    }

    .brand img { width: 32px; height: 32px; border-radius: 50%; }

    .code {
      font-family: var(--font-display);
      font-size: 5.5rem;
      line-height: 1;
      color: var(--red);
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      line-height: 1.15;
      margin: 0 0 1rem;
      color: var(--text);
      font-weight: 600;
    }

    p {
      color: var(--text-muted);
      margin: 0 0 1.75rem;
      font-size: 1.02rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 1.6rem;
      border-radius: 6px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      background: var(--red);
      color: #fff;
    }

    .btn-primary:hover { background: var(--red-dark); }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .links {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .links ul {
      list-style: none;
      padding: 0;
      margin: 0.75rem 0 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem 1.25rem;
    }

    .links a {
      color: var(--red);
      text-decoration: none;
    }

    .links a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 2.25rem 1.5rem; }
      .code { font-size: 4.25rem; }
      h1 { font-size: 1.5rem; }
    }
  </style>
